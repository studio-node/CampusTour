name: Webapp E2E (Selenium)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  webapp-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Build webapp
        working-directory: webapp
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Start preview server
        working-directory: webapp
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          echo $! > /tmp/vite-preview.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:4173/ >/dev/null; then
              echo "Preview ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview failed to start"
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: webapp/e2e/requirements.txt

      - name: Install Python test dependencies
        run: pip install -r webapp/e2e/requirements.txt

      - name: Run Selenium E2E tests
        working-directory: webapp/e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: pytest -v

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/vite-preview.pid ]; then
            kill $(cat /tmp/vite-preview.pid) 2>/dev/null || true
          fi
