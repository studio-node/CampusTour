---
- name: Bootstrap and deploy Campus Tour staging
  hosts: staging
  become: true

  vars:
    deploy_root: /opt/campus-tour-staging
    compose_file: docker-compose.staging.yml
    env_file_name: .env

  tasks:
    - name: Ensure apt cache is up to date
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - gnupg
        state: present

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker engine and compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Create deploy root directory
      ansible.builtin.file:
        path: "{{ deploy_root }}"
        state: directory
        mode: "0755"

    - name: Create nginx config directory
      ansible.builtin.file:
        path: "{{ deploy_root }}/infra/nginx"
        state: directory
        mode: "0755"

    - name: Upload docker compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker-compose.staging.yml"
        dest: "{{ deploy_root }}/{{ compose_file }}"
        mode: "0644"

    - name: Upload nginx config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../nginx/nginx.conf"
        dest: "{{ deploy_root }}/infra/nginx/nginx.conf"
        mode: "0644"

    - name: Upload staging env file
      ansible.builtin.copy:
        src: "{{ staging_env_file }}"
        dest: "{{ deploy_root }}/{{ env_file_name }}"
        mode: "0600"

    - name: Deploy containers (build on host)
      ansible.builtin.command:
        chdir: "{{ deploy_root }}"
        cmd: "docker compose --env-file {{ env_file_name }} -f {{ compose_file }} up -d --build"
      changed_when: true

